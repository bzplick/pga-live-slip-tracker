name: Update PGA Leaderboard

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: write

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch ESPN PGA leaderboard
        run: |
          curl -L --fail --retry 3 --retry-delay 5 \
            'https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard' \
            -o leaderboard.json

      - name: Add timestamp metadata
        run: |
          python - <<'PY'
          import json, datetime
          p='leaderboard.json'
          with open(p,'r',encoding='utf-8') as f:
              data=json.load(f)
          data['_tracker_updated_utc']=datetime.datetime.utcnow().isoformat(timespec='seconds')+'Z'
          with open(p,'w',encoding='utf-8') as f:
              json.dump(data,f,separators=(',',':'))
          PY

      - name: Commit updated leaderboard
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add leaderboard.json
          git diff --cached --quiet && echo 'No leaderboard changes' || git commit -m 'Update leaderboard data'
          git push