<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Edge Slip Tracker</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #141b34;
      --card2: #1c2544;
      --text: #edf2ff;
      --muted: #9daccc;
      --good: #28d17c;
      --bad: #ff5c7a;
      --warn: #ffd166;
      --line: rgba(255,255,255,.12);
      --accent: #65a7ff;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: linear-gradient(180deg, #071026, #0b1020 45%); color: var(--text); }
    header { position: sticky; top: 0; z-index: 10; background: rgba(11,16,32,.92); backdrop-filter: blur(10px); border-bottom: 1px solid var(--line); padding: 14px 14px 10px; }
    h1 { font-size: 20px; margin: 0 0 5px; }
    .sub { color: var(--muted); font-size: 12px; }
    main { padding: 14px; max-width: 1120px; margin: auto; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width: 900px) { .grid { grid-template-columns: 380px 1fr; } }
    .card { background: rgba(20,27,52,.96); border: 1px solid var(--line); border-radius: 16px; padding: 14px; box-shadow: 0 10px 30px rgba(0,0,0,.18); }
    .card h2 { margin: 0 0 12px; font-size: 16px; }
    label { display: block; font-size: 12px; color: var(--muted); margin: 8px 0 5px; }
    input, select, textarea { width: 100%; padding: 11px; border-radius: 12px; border: 1px solid var(--line); background: #0f1730; color: var(--text); font-size: 15px; outline: none; }
    textarea { min-height: 72px; resize: vertical; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    button { border: 0; border-radius: 12px; padding: 11px 12px; font-weight: 700; color: #071026; background: var(--accent); cursor: pointer; }
    button.secondary { background: #273457; color: var(--text); border: 1px solid var(--line); }
    button.good { background: var(--good); }
    button.bad { background: var(--bad); color: white; }
    .btnrow { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .stats { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; margin-bottom: 12px; }
    @media (min-width: 720px) { .stats { grid-template-columns: repeat(4,1fr); } }
    .stat { background: var(--card2); border: 1px solid var(--line); border-radius: 14px; padding: 12px; }
    .stat .k { color: var(--muted); font-size: 11px; }
    .stat .v { font-size: 20px; font-weight: 800; margin-top: 3px; }
    .slip { border: 1px solid var(--line); border-radius: 16px; margin-bottom: 12px; overflow: hidden; background: rgba(28,37,68,.7); }
    .slipHead { display: flex; justify-content: space-between; gap: 10px; padding: 12px; border-bottom: 1px solid var(--line); }
    .slipTitle { font-weight: 800; }
    .pill { display: inline-block; padding: 4px 8px; border-radius: 999px; font-size: 11px; font-weight: 800; background: #273457; color: var(--text); margin: 2px; }
    .pill.good { background: rgba(40,209,124,.16); color: var(--good); border: 1px solid rgba(40,209,124,.35); }
    .pill.bad { background: rgba(255,92,122,.16); color: var(--bad); border: 1px solid rgba(255,92,122,.35); }
    .pill.warn { background: rgba(255,209,102,.16); color: var(--warn); border: 1px solid rgba(255,209,102,.35); }
    .legs { padding: 8px; }
    .leg { background: #101832; border: 1px solid var(--line); border-radius: 14px; padding: 10px; margin-bottom: 8px; }
    .legTop { display: flex; justify-content: space-between; gap: 8px; align-items: flex-start; }
    .muted { color: var(--muted); font-size: 12px; }
    .small { font-size: 12px; }
    .calcLine { display: grid; grid-template-columns: repeat(2,1fr); gap: 6px; margin-top: 8px; }
    @media (min-width: 760px) { .calcLine { grid-template-columns: repeat(4,1fr); } }
    .mini { background: rgba(255,255,255,.05); border-radius: 10px; padding: 8px; }
    .mini b { display: block; font-size: 13px; margin-top: 2px; }
    .empty { color: var(--muted); text-align: center; padding: 28px 8px; border: 1px dashed var(--line); border-radius: 16px; }
    .footerNote { color: var(--muted); font-size: 11px; margin-top: 10px; line-height: 1.35; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <header>
    <h1>Live Edge Slip Tracker</h1>
    <div class="sub">Free MVP • Manual odds/model input • Local browser save • GitHub Pages ready</div>
  </header>

  <main>
    <div class="stats" id="stats"></div>

    <div class="grid">
      <section class="card">
        <h2>Add Betting Slip</h2>
        <label>Slip Name</label>
        <input id="slipName" placeholder="DK MLB Parlay" />
        <div class="row">
          <div><label>Sportsbook</label><input id="sportsbook" placeholder="DraftKings" /></div>
          <div><label>Stake $</label><input id="stake" type="number" step="0.01" placeholder="25" /></div>
        </div>
        <div class="row">
          <div><label>Offered Payout $</label><input id="payout" type="number" step="0.01" placeholder="180" /></div>
          <div><label>Status</label><select id="slipStatus"><option>pending</option><option>won</option><option>lost</option><option>cashed out</option></select></div>
        </div>
        <button style="width:100%;margin-top:12px" onclick="addSlip()">Create Slip</button>

        <hr style="border-color:var(--line);margin:16px 0" />

        <h2>Add Leg</h2>
        <label>Choose Slip</label>
        <select id="legSlip"></select>
        <label>Event</label>
        <input id="event" placeholder="Yankees vs Red Sox" />
        <label>Market / Selection</label>
        <input id="selection" placeholder="Judge over 1.5 hits" />
        <div class="row3">
          <div><label>Odds</label><input id="odds" type="number" placeholder="+145 or -120" /></div>
          <div><label>Model %</label><input id="modelProb" type="number" step="0.1" placeholder="48" /></div>
          <div><label>Status</label><select id="legStatus"><option>pending</option><option>won</option><option>lost</option><option>void</option></select></div>
        </div>
        <label>Notes</label>
        <textarea id="notes" placeholder="Why you like it, injury angle, weather, matchup, etc."></textarea>
        <button style="width:100%;margin-top:12px" onclick="addLeg()">Add Leg</button>

        <div class="btnrow">
          <button class="secondary" onclick="exportData()">Export Backup</button>
          <button class="secondary" onclick="document.getElementById('importFile').click()">Import</button>
          <button class="bad" onclick="resetAll()">Reset</button>
        </div>
        <input id="importFile" class="hidden" type="file" accept="application/json" onchange="importData(event)" />
        <div class="footerNote">Model % is your estimated hit probability. Edge = Model Probability − Book Implied Probability. EV assumes $100 risk sizing for comparison.</div>
      </section>

      <section class="card">
        <h2>Active Slips</h2>
        <div id="slips"></div>
      </section>
    </div>
  </main>

<script>
const LS_KEY = 'edgeSlipTracker.v1';
let data = JSON.parse(localStorage.getItem(LS_KEY) || '{"slips":[]}');

function save(){ localStorage.setItem(LS_KEY, JSON.stringify(data)); render(); }
function uid(){ return Math.random().toString(36).slice(2,10); }
function n(v){ return Number(v || 0); }
function pct(v){ return isFinite(v) ? `${v.toFixed(2)}%` : '—'; }
function money(v){ return isFinite(v) ? `$${v.toFixed(2)}` : '—'; }

function impliedFromAmerican(odds){
  odds = n(odds);
  if(!odds) return NaN;
  return odds > 0 ? 100 / (odds + 100) * 100 : Math.abs(odds) / (Math.abs(odds) + 100) * 100;
}
function decimalFromAmerican(odds){
  odds = n(odds);
  if(!odds) return NaN;
  return odds > 0 ? 1 + odds/100 : 1 + 100/Math.abs(odds);
}
function americanFromProb(probPct){
  const p = probPct / 100;
  if(!p || p <= 0 || p >= 1) return '—';
  return p > 0.5 ? Math.round(-100*p/(1-p)) : `+${Math.round((100*(1-p))/p)}`;
}
function evPer100(odds, modelPct){
  const dec = decimalFromAmerican(odds);
  const p = modelPct / 100;
  if(!isFinite(dec) || !isFinite(p)) return NaN;
  return (p * ((dec - 1) * 100)) - ((1 - p) * 100);
}
function legMetrics(leg){
  const implied = impliedFromAmerican(leg.odds);
  const model = n(leg.modelProb);
  const edge = model - implied;
  const ev = evPer100(leg.odds, model);
  return { implied, model, edge, ev, fairOdds: americanFromProb(model) };
}
function parlayModelProb(legs){
  const active = legs.filter(l => l.status !== 'void');
  if(!active.length) return NaN;
  return active.reduce((acc,l)=>acc*(n(l.modelProb)/100),1)*100;
}
function parlayBookProb(legs){
  const active = legs.filter(l => l.status !== 'void');
  if(!active.length) return NaN;
  return active.reduce((acc,l)=>acc*(impliedFromAmerican(l.odds)/100),1)*100;
}

function addSlip(){
  data.slips.unshift({
    id: uid(), name: document.getElementById('slipName').value || 'Untitled Slip',
    sportsbook: document.getElementById('sportsbook').value || '', stake: n(document.getElementById('stake').value),
    payout: n(document.getElementById('payout').value), status: document.getElementById('slipStatus').value, legs: [], createdAt: new Date().toISOString()
  });
  ['slipName','sportsbook','stake','payout'].forEach(id=>document.getElementById(id).value='');
  save();
}
function addLeg(){
  const slip = data.slips.find(s => s.id === document.getElementById('legSlip').value);
  if(!slip) return alert('Create or choose a slip first.');
  slip.legs.push({ id: uid(), event: document.getElementById('event').value, selection: document.getElementById('selection').value,
    odds: n(document.getElementById('odds').value), modelProb: n(document.getElementById('modelProb').value), status: document.getElementById('legStatus').value,
    notes: document.getElementById('notes').value });
  ['event','selection','odds','modelProb','notes'].forEach(id=>document.getElementById(id).value='');
  save();
}
function updateSlip(id, key, value){ const s=data.slips.find(x=>x.id===id); s[key]=value; save(); }
function updateLeg(sid,lid,key,value){ const l=data.slips.find(s=>s.id===sid).legs.find(x=>x.id===lid); l[key]=key==='odds'||key==='modelProb'?n(value):value; save(); }
function deleteSlip(id){ if(confirm('Delete this slip?')) { data.slips=data.slips.filter(s=>s.id!==id); save(); } }
function deleteLeg(sid,lid){ const s=data.slips.find(x=>x.id===sid); s.legs=s.legs.filter(l=>l.id!==lid); save(); }

function renderStats(){
  const slips = data.slips, legs = slips.flatMap(s=>s.legs);
  const pending = slips.filter(s=>s.status==='pending').length;
  const avgEdge = legs.length ? legs.reduce((a,l)=>a+legMetrics(l).edge,0)/legs.length : 0;
  const plusEV = legs.filter(l=>legMetrics(l).edge>0).length;
  const risk = slips.reduce((a,s)=>a+n(s.stake),0);
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="k">Slips</div><div class="v">${slips.length}</div></div>
    <div class="stat"><div class="k">Pending</div><div class="v">${pending}</div></div>
    <div class="stat"><div class="k">Avg Edge</div><div class="v">${pct(avgEdge)}</div></div>
    <div class="stat"><div class="k">Total Risk</div><div class="v">${money(risk)}</div></div>`;
}
function renderSelect(){
  document.getElementById('legSlip').innerHTML = data.slips.map(s=>`<option value="${s.id}">${escapeHtml(s.name)}</option>`).join('');
}
function renderSlips(){
  const el = document.getElementById('slips');
  if(!data.slips.length){ el.innerHTML='<div class="empty">No slips yet. Create your first slip on the left.</div>'; return; }
  el.innerHTML = data.slips.map(s=>{
    const mp = parlayModelProb(s.legs), bp = parlayBookProb(s.legs), edge = mp - bp;
    const cls = edge > 3 ? 'good' : edge < 0 ? 'bad' : 'warn';
    return `<div class="slip">
      <div class="slipHead">
        <div><div class="slipTitle">${escapeHtml(s.name)}</div><div class="muted">${escapeHtml(s.sportsbook || 'No book')} • Stake ${money(n(s.stake))} • Payout ${money(n(s.payout))}</div></div>
        <div style="text-align:right"><span class="pill ${s.status==='won'?'good':s.status==='lost'?'bad':'warn'}">${s.status}</span><br><button class="secondary small" onclick="deleteSlip('${s.id}')">Delete</button></div>
      </div>
      <div style="padding:10px">
        <span class="pill ${cls}">Parlay Edge: ${pct(edge)}</span>
        <span class="pill">Model: ${pct(mp)}</span>
        <span class="pill">Book: ${pct(bp)}</span>
        <select onchange="updateSlip('${s.id}','status',this.value)" style="margin-top:8px"><option ${s.status==='pending'?'selected':''}>pending</option><option ${s.status==='won'?'selected':''}>won</option><option ${s.status==='lost'?'selected':''}>lost</option><option ${s.status==='cashed out'?'selected':''}>cashed out</option></select>
      </div>
      <div class="legs">${s.legs.length ? s.legs.map(l=>renderLeg(s.id,l)).join('') : '<div class="muted">No legs added yet.</div>'}</div>
    </div>`;
  }).join('');
}
function renderLeg(sid,l){
  const m = legMetrics(l), cls = m.edge > 3 ? 'good' : m.edge < 0 ? 'bad' : 'warn';
  return `<div class="leg">
    <div class="legTop"><div><b>${escapeHtml(l.selection || 'Unnamed Leg')}</b><div class="muted">${escapeHtml(l.event || '')}</div></div><button class="secondary small" onclick="deleteLeg('${sid}','${l.id}')">Remove</button></div>
    <div class="calcLine">
      <div class="mini"><span class="muted">Odds</span><input value="${l.odds}" onchange="updateLeg('${sid}','${l.id}','odds',this.value)"></div>
      <div class="mini"><span class="muted">Model %</span><input value="${l.modelProb}" onchange="updateLeg('${sid}','${l.id}','modelProb',this.value)"></div>
      <div class="mini"><span class="muted">Implied</span><b>${pct(m.implied)}</b></div>
      <div class="mini"><span class="muted">Edge</span><b class="${cls}">${pct(m.edge)}</b></div>
      <div class="mini"><span class="muted">EV / $100</span><b>${money(m.ev)}</b></div>
      <div class="mini"><span class="muted">Fair Odds</span><b>${m.fairOdds}</b></div>
      <div class="mini"><span class="muted">Status</span><select onchange="updateLeg('${sid}','${l.id}','status',this.value)"><option ${l.status==='pending'?'selected':''}>pending</option><option ${l.status==='won'?'selected':''}>won</option><option ${l.status==='lost'?'selected':''}>lost</option><option ${l.status==='void'?'selected':''}>void</option></select></div>
    </div>
    ${l.notes ? `<div class="footerNote">${escapeHtml(l.notes)}</div>` : ''}
  </div>`;
}
function render(){ renderStats(); renderSelect(); renderSlips(); }
function exportData(){
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'edge-slip-tracker-backup.json'; a.click();
}
function importData(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = () => { try { data = JSON.parse(reader.result); save(); } catch { alert('Invalid JSON backup.'); } };
  reader.readAsText(file);
}
function resetAll(){ if(confirm('Clear all local data?')) { data={slips:[]}; save(); } }
function escapeHtml(str){ return String(str||'').replace(/[&<>'"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
render();
</script>
</body>
</html>
