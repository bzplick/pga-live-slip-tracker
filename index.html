<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Full Monty PGA Slip Tracker</title><style>:root{--bg:#07110f;--p:#10201c;--c:#172b26;--l:#285145;--t:#f4fff9;--m:#9fb2ab;--g:#12f7b0;--y:#facc15;--r:#fb7185}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--t);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}header{position:sticky;top:0;z-index:9;background:#081713;border-bottom:1px solid var(--l);padding:16px}h1{margin:0;font-size:26px}.sub{color:var(--m);font-size:13px;margin-top:4px}.wrap{max-width:1500px;margin:auto;padding:14px;display:grid;gap:14px}.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}.box,.card{background:var(--p);border:1px solid var(--l);border-radius:16px;padding:12px}.kpi b{display:block;color:var(--g);font-size:22px}.kpi span,.muted,small{color:var(--m)}.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}button,a.btn{border:1px solid var(--l);background:#17372f;color:var(--t);border-radius:12px;padding:9px 12px;text-decoration:none;font-weight:800}button{cursor:pointer}.primary{background:var(--g);color:#032014}input{background:#07110f;color:var(--t);border:1px solid var(--l);border-radius:12px;padding:9px;min-width:360px}.grid{display:grid;grid-template-columns:430px 1fr;gap:14px}@media(max-width:980px){.grid,.kpis{grid-template-columns:1fr}input{min-width:100%}}.slip{background:var(--c);border:1px solid var(--l);border-radius:16px;padding:12px;margin:10px 0}.slip.dead{opacity:.7;border-color:#7f1d1d}.head{display:flex;justify-content:space-between;gap:10px;border-bottom:1px solid var(--l);padding-bottom:8px}.head h3{margin:2px 0}.odds{text-align:right;font-size:18px;font-weight:900}.leg{display:grid;grid-template-columns:1fr auto;gap:8px;padding:7px 0;border-bottom:1px dashed #2d5a50}.leg:last-child{border-bottom:0}em{font-style:normal;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:900;border:1px solid var(--l);white-space:nowrap}.wait{background:#172554;color:#bfdbfe}.live{background:#422006;color:#fde68a}.hit{background:#064e3b;color:#a7f3d0}.miss{background:#4c0519;color:#fecdd3}.near{background:#713f12;color:#fef3c7}table{width:100%;border-collapse:collapse;font-size:13px}th,td{border-bottom:1px solid var(--l);padding:8px;text-align:left;vertical-align:middle}th{background:#10201c;color:#a7f3d0;position:sticky;top:78px;z-index:3}td small{display:block;font-size:11px}.good{color:var(--g)}.bad{color:var(--r)}.warn{color:var(--y)}a{color:#86efac}.bar{height:6px;width:70px;background:#0b1916;border-radius:99px;overflow:hidden;margin-top:3px}.bar i{display:block;height:100%;background:var(--g)}.note{background:#0f1f1b;border:1px solid var(--l);border-radius:14px;padding:12px;color:#d1fae5}</style></head><body><header><h1>Full Monty PGA Slip Tracker</h1><div class="sub">Static slips render immediately. Live feed tries leaderboard.json first, then ESPN PGA scoreboard. Cut rule: today-only score over +5 = Missed Cut.</div></header><main class="wrap"><section class="kpis" id="kpis"></section><section class="box controls"><button class="primary" onclick="loadBoard()">Refresh live data</button><input id="jsonUrl" value="leaderboard.json"><a class="btn" target="_blank" href="https://www.pgatour.com/leaderboard">PGA</a><a class="btn" target="_blank" href="https://www.espn.com/golf/leaderboard">ESPN</a><a class="btn" target="_blank" href="https://www.cbssports.com/golf/leaderboard/">CBS</a><a class="btn" target="_blank" href="https://datagolf.com/live-model">DataGolf</a></section><div class="note" id="note"><b>Loading feed...</b></div><section class="grid"><aside class="card"><h2>Slip Cards</h2><div id="slips"></div></aside><section class="card"><h2>Player Tracker</h2><div style="overflow:auto"><table><thead><tr><th>Player</th><th>Books</th><th>Markets</th><th>Pos</th><th>Total</th><th>Today</th><th>Thru</th><th>Cut</th><th>Hit %</th><th>Edge</th><th>Data</th></tr></thead><tbody id="players"></tbody></table></div></section></section></main><script>const slips=[['Bet365','B365 Top 10 Trio',25000,1,251,[['Denny McCarthy',10],['Alex Noren',10],['Justin Rose',10]]],['Bet365','B365 Lotto Top 20 A',65000,1,651,[['Maverick McNealy',20],['Lucas Glover',20],['Michael Kim',20],['Andrew Novak',20],['Ryan Fox',20],['Sahith Theegala',20]]],['Bet365','B365 Lotto Top 20 B',70000,1,701,[['Alex Fitzpatrick',20],['Bud Cauley',20],['Sungjae Im',20],['Ryan Gerard',20],['Shane Lowry',20],['Akshay Bhatia',20]]],['Bet365','B365 Core Top 20',3300,1,34,[['Rory McIlroy',20],['Ludvig Aberg',20],['Xander Schauffele',20],['Jacob Bridgeman',20],['Brian Harman',20]]],['Bet365','B365 Top 20 Mix',2000,1,21,[['Cameron Young',20],['Matt Fitzpatrick',20],['Tommy Fleetwood',20],['Jordan Spieth',20],['Min Woo Lee',20]]],['DraftKings','DK 5 Pick Top 20',5500,1,56,[['Si Woo Kim',20],['Akshay Bhatia',20],['Justin Rose',20],['J.J. Spaun',20],['Justin Thomas',20]]],['DraftKings','DK 5 Pick Top 20 Lotto',15000,1,151,[['Gary Woodland',20],['Alex Fitzpatrick',20],['Chris Gotterup',20],['Sam Burns',20],['Shane Lowry',20]]],['DraftKings','DK Top 20 Triple',4000,1,41,[['Andrew Novak',20],['Sahith Theegala',20],['Sungjae Im',20]]],['DraftKings','DK Mixed 20/30',2978,1,30.78,[['Jacob Bridgeman',20],['Ryan Fox',30],['Hideki Matsuyama',30],['Jordan Spieth',30],['Sam Burns',30]]],['DraftKings','DK Top 10 Longshot',30000,1,301,[['Brian Harman',10],['Wyndham Clark',10],['Jason Day',10]]],['DraftKings','DK Top 10 Chalk',2600,1,27,[['Cameron Young',10],['Ben Griffin',10],['Patrick Cantlay',10]]]];const BASE={10:.18,20:.32,30:.46};const qs=s=>document.querySelector(s),qsa=s=>[...document.querySelectorAll(s)];function norm(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'')}function parseScore(x){if(x==null||x==='')return null;let t=String(x).trim().toUpperCase().replace('−','-');if(['E','EVEN','-'].includes(t))return 0;let n=parseInt(t.replace('+',''),10);return isNaN(n)?null:n}function fmt(x){if(x==null||x==='')return '—';if(typeof x==='number')return x>0?'+'+x:String(x);return String(x)}function pct(x){return (x*100).toFixed(1)+'%'}function money(x){return '$'+Number(x).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}function prob(row,t){if(!row)return BASE[t]||.25;let rank=Number(row.position||row.pos||row.rank||999),today=parseScore(row.roundScore??row.today??row.todayScore??row.rnd??row.round),thru=Number(row.thru||0),total=parseScore(row.total??row.score??row.totalScore);if(today!=null&&today>5)return 0;let p=BASE[t]||.25;if(rank<999)p+=(t-rank)*.014;if(today!=null)p+=(-today)*.012;if(total!=null)p+=(-total)*.006;if(thru)p+=Math.min(thru,18)/18*.04;if(rank<=t)p+=.18;if(rank>t+18)p-=.12;return Math.max(.01,Math.min(.94,p))}function render(){let pay=slips.reduce((a,s)=>a+s[4],0),w=slips.reduce((a,s)=>a+s[3],0),map={};slips.forEach(s=>s[5].forEach(l=>{let p=l[0],t=l[1];map[p]=map[p]||{books:new Set,markets:[]};map[p].books.add(s[0]);map[p].markets.push('Top '+t)}));qs('#kpis').innerHTML=`<div class='box kpi'><b>${money(w)}</b><span>Total wager</span></div><div class='box kpi'><b>${money(pay)}</b><span>Max return</span></div><div class='box kpi'><b>${slips.length}</b><span>Slips</span></div><div class='box kpi'><b>${Object.keys(map).length}</b><span>Players</span></div><div class='box kpi'><b id='alive'>${slips.length}</b><span>Alive slips</span></div><div class='box kpi'><b id='feed'>Static</b><span>Feed</span></div>`;qs('#slips').innerHTML=slips.map((s,i)=>`<article class='slip' data-slip='${i}'><div class='head'><div><strong>${s[0]}</strong><h3>${s[1]}</h3><small>${s[5].length} picks • wager ${money(s[3])} • pays ${money(s[4])}</small></div><div class='odds'>+${s[2]}<br><em class='live slipstat'>OPEN</em></div></div>${s[5].map(l=>`<div class='leg' data-leg='${norm(l[0])}'><div><b>${l[0]}</b><small>Top ${l[1]} target</small></div><em class='wait'>WAIT</em></div>`).join('')}</article>`).join('');qs('#players').innerHTML=Object.entries(map).sort().map(([p,d])=>`<tr data-player='${p}'><td><b>${p}</b></td><td>${[...d.books].join(', ')}</td><td>${[...new Set(d.markets)].join(', ')}</td><td class='pos'>—</td><td class='total'>—</td><td class='today'>—</td><td class='thru'>—</td><td><em class='wait cut'>WAIT</em></td><td class='hitp'>—</td><td class='edge'>Pending</td><td class='source'>—</td></tr>`).join('')}function readBoard(data){let rows=Array.isArray(data)?data:(data.players||data.leaderboard||data.rows||[]);if(!rows.length&&data.events){let ev=data.events.find(e=>/memorial/i.test(e.name||e.shortName||''))||data.events[0],comp=ev?.competitions?.[0];rows=(comp?.competitors||[]).map(c=>{let ls=c.linescores||[],r=[...ls].reverse().find(x=>x&&x.displayValue!==undefined)||{},thru=Array.isArray(r.linescores)?r.linescores.length:(r.thru||r.period||0),status=String(c.status?.type?.name||c.status?.displayName||'').toLowerCase();return {player:c.athlete?.displayName||c.displayName||'',position:c.curatedRank?.current||c.order||c.rank||'',total:c.score||c.displayValue||'',roundScore:r.displayValue||r.value||'',today:r.displayValue||r.value||'',thru:thru>=18?'F':(thru||''),status,source:'ESPN'}})}let out={};rows.forEach(r=>{let name=r.player||r.name||r.golfer||r.athlete?.displayName;if(name)out[norm(name)]=r});return out}async function fetchFirst(){let custom=qs('#jsonUrl').value.trim(),urls=[custom,'https://site.web.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard','https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard'].filter(Boolean),errs=[];for(let u of urls){try{let res=await fetch(u+(u.includes('?')?'&':'?')+'v='+Date.now(),{cache:'no-store'});if(!res.ok)throw Error(res.status);return{url:u,data:await res.json()}}catch(e){errs.push(u+': '+e.message)}}throw Error(errs.join(' | '))}async function loadBoard(){let note=qs('#note');try{let got=await fetchFirst(),board=readBoard(got.data),matched=0;qsa('tr[data-player]').forEach(tr=>{let p=tr.dataset.player,row=board[norm(p)],markets=tr.children[2].textContent.match(/Top \d+/g)||[],best=0;if(row){matched++;let pos=row.position??row.pos??row.rank,total=row.total??row.score??row.totalScore,today=parseScore(row.roundScore??row.today??row.todayScore??row.rnd??row.round),thru=row.thru??row.hole??'—';tr.querySelector('.pos').textContent=pos??'—';tr.querySelector('.total').textContent=fmt(total);tr.querySelector('.today').textContent=fmt(today);tr.querySelector('.thru').textContent=fmt(thru);tr.querySelector('.source').textContent=row.source||got.url.includes('espn')?'ESPN':'JSON';markets.forEach(m=>best=Math.max(best,prob(row,parseInt(m.replace('Top ','')))));let edge=best-(BASE[parseInt(markets[0]?.replace('Top ',''))]||.25),cut=tr.querySelector('.cut');if(today!=null&&today>5){cut.className='miss cut';cut.textContent='MISSED CUT';tr.querySelector('.edge').innerHTML='<span class=bad>Today '+fmt(today)+' > +5</span>';tr.querySelector('.hitp').textContent='0.0%'}else{cut.className=(today!=null&&today>=4?'near cut':'hit cut');cut.textContent=today!=null&&today>=4?'NEAR CUT':'LIVE';tr.querySelector('.hitp').innerHTML=pct(best)+`<div class='bar'><i style='width:${Math.max(2,best*100)}%'></i></div>`;tr.querySelector('.edge').innerHTML=(edge>=0?'<span class=good>+':'<span class=bad>')+pct(edge)+'</span>'}}});slips.forEach((s,i)=>{let dead=false,inside=0;s[5].forEach(l=>{let row=board[norm(l[0])],today=row&&parseScore(row.roundScore??row.today??row.todayScore??row.rnd??row.round),rank=row&&Number(row.position||row.pos||row.rank||999);if(today!=null&&today>5)dead=true;if(rank<=l[1])inside++});let card=qs(`[data-slip='${i}']`),st=card.querySelector('.slipstat');card.classList.toggle('dead',dead);st.className=dead?'miss slipstat':'live slipstat';st.textContent=dead?'DEAD':inside+'/'+s[5].length+' in target'});qs('#alive').textContent=qsa('.slip:not(.dead)').length;qs('#feed').textContent=got.url.includes('espn')?'ESPN':'JSON';note.innerHTML=`Live feed loaded from <b>${got.url}</b>. Matched ${matched} player rows. Cut rule: today-only score over +5 = Missed Cut.`}catch(e){qs('#feed').textContent='Static';note.innerHTML='<b>Static tracker loaded.</b> Live feed did not load in-browser. Slips/players remain visible. Error: '+String(e.message).slice(0,220)}}render();loadBoard();setInterval(loadBoard,60000);</script></body></html>
