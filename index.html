<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PGA Live Slip Tracker</title><style>:root{--bg:#07111f;--panel:#0f1b2d;--line:#263850;--muted:#92a4bb;--text:#eaf2ff;--good:#31d17c;--bad:#ff5d73;--warn:#ffc857;--accent:#35c8ff}*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:radial-gradient(circle at top left,#13294a,var(--bg) 45%);color:var(--text)}header,main,.grid{max-width:1280px;margin:auto}header{padding:28px 18px 8px}h1{margin:0;font-size:clamp(30px,5vw,54px);letter-spacing:-.04em}.sub{color:var(--muted);max-width:950px;margin-top:8px;line-height:1.45}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:0 18px;margin-top:18px}.kpi,.slip,.model{background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.015));border:1px solid var(--line);border-radius:18px;box-shadow:0 18px 50px rgba(0,0,0,.25)}.kpi{padding:16px}.kpi span,.metric span{display:block;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em}.kpi b{display:block;font-size:24px;margin-top:4px}.good{color:var(--good)!important}.bad{color:var(--bad)!important}.warn{color:var(--warn)!important}main{padding:0 18px 45px}.slip{margin:24px 0;overflow:hidden}.head{display:flex;justify-content:space-between;gap:15px;align-items:flex-start;padding:20px;background:rgba(53,200,255,.06);border-bottom:1px solid var(--line)}.head h2{margin:0 0 6px;font-size:28px}.head p{margin:0;color:var(--muted)}.pill{padding:8px 12px;border-radius:999px;font-weight:800;border:1px solid rgba(49,209,124,.35);background:rgba(49,209,124,.08);color:var(--good)}.metrics{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--line)}.metric{padding:14px;background:rgba(15,27,45,.94)}.metric b{font-size:20px;display:block;margin-top:5px}.wrap{overflow-x:auto}table{width:100%;border-collapse:collapse;min-width:1120px}th,td{padding:12px 10px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}th{font-size:12px;color:#9edfff;text-transform:uppercase;letter-spacing:.06em;background:rgba(19,36,60,.78)}small{display:block;color:var(--muted);margin-top:2px}.leg{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;background:#13243c;border:1px solid var(--line);border-radius:50%;font-weight:800}.bar{height:8px;background:#263850;border-radius:99px;overflow:hidden;margin:4px 0 2px;min-width:85px}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--bad),var(--warn),var(--good));border-radius:99px}.model{padding:20px;margin:22px 0;color:var(--muted);line-height:1.65}.model h2{margin-top:0;color:var(--text)}button{background:var(--accent);color:#04111e;border:0;border-radius:12px;padding:11px 14px;font-weight:900;cursor:pointer}a{color:#8be0ff}@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}.metrics{grid-template-columns:repeat(2,1fr)}.head{flex-direction:column}}@media(max-width:520px){.grid{grid-template-columns:1fr}}</style></head><body><header><h1>PGA Live Slip Tracker</h1><div class="sub">Auto-refreshing live slip dashboard. Pulls current PGA leaderboard data from ESPN every 60 seconds, then recalculates score, position, hole/thru, hit %, edge, fair odds, and EV for each bet slip.</div></header><section class="grid" id="kpis"></section><main id="app"></main><script>const API='https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard';const slips=[{name:'Slip 1',odds:5500,wager:1,payout:56,legs:[['Si Woo Kim',10,18],['Wyndham Clark',10,18],['Max McGreevy',10,18]]},{name:'Slip 2',odds:15000,wager:1,payout:151,legs:[['Sungjae Im',10,18],['Chris Kirk',10,18],['Stephan Jaeger',10,18]]},{name:'Slip 3',odds:22500,wager:1,payout:226,legs:[['Brooks Koepka',20,32],['Nick Dunlap',20,32],['Jhonattan Vegas',20,32],['William Mouw',20,32]]},{name:'Slip 4',odds:22500,wager:1,payout:226,legs:[['Matthieu Pavon',20,32],['Tom Hoge',20,32],['Patrick Fishburn',20,32]]}];const fmtPct=x=>(x*100).toFixed(2)+'%';const implied=o=>100/(o+100);const fair=p=>p<=0?'—':'+'+Math.round((1-p)/p*100);function cls(x){return x>=0?'good':'bad'}function parlayProb(a){return a.reduce((p,x)=>p*x.live,1)}function posText(n,ties){return ties[n]>1?'T'+n:n}function currentRound(c){return [...(c.linescores||[])].reverse().find(r=>r&&r.displayValue!==undefined)||{} }function madeHole(r){return r.linescores? r.linescores.length:0}function hitPct(player,target,base){if(!player)return .01;let pos=player.rank||999,thru=player.thru||0,round=Number(player.roundScore)||0;let p=base/100;let rankBoost=(target-pos)/target*.09;let roundBoost=(-round)*.012;let progress=0.75+(thru/72)*.55;p=(p+rankBoost+roundBoost)*progress;if(pos<=target)p+=target===10?.16:.20;if(pos>target+50)p=.01;return Math.max(.01,Math.min(.92,p))}function buildPlayers(data){let comps=data.events?.[0]?.competitions?.[0]?.competitors||[];let arr=comps.map(c=>{let r=currentRound(c);let total=Number(c.score);let roundScore=r.displayValue||'E';let thru=madeHole(r);return{name:c.athlete.displayName,total:isNaN(total)?0:total,score:c.score,roundScore,thru,hole:thru>=18?'F':(thru+1),r1:c.linescores?.[0]?.displayValue||'',r2:c.linescores?.[1]?.displayValue||'',r3:c.linescores?.[2]?.displayValue||'',order:c.order||999}}).sort((a,b)=>a.total-b.total||a.order-b.order);let ties={};arr.forEach((p,i)=>{let rank=1+arr.filter(x=>x.total<p.total).length;p.rank=rank;ties[rank]=(ties[rank]||0)+1});arr.forEach(p=>p.pos=posText(p.rank,ties));return arr}function render(data){let players=buildPlayers(data);let map=Object.fromEntries(players.map(p=>[p.name.toLowerCase(),p]));let totalEV=0,best={name:'—',edge:-9},alive=0,html='';for(const s of slips){let imp=implied(s.odds), legImp=Math.pow(imp,1/s.legs.length);let legs=s.legs.map((l,i)=>{let p=map[l[0].toLowerCase()];let live=hitPct(p,l[1],l[2]);let edge=live-legImp;return{n:i+1,name:l[0],target:l[1],base:l[2],p,live,edge,status:live>.02?'Alive':'Danger'}});let par=parlayProb(legs), edge=par-imp, ev=par*(s.payout-s.wager)-(1-par)*s.wager;totalEV+=ev;if(edge>best.edge)best={name:s.name,edge};if(legs.some(l=>l.live>.02))alive++;html+=`<section class="slip"><div class="head"><div><h2>${s.name}</h2><p>Odds +${s.odds.toLocaleString()} • Wager $${s.wager.toFixed(2)} • To Pay $${s.payout.toFixed(2)} • Profit $${(s.payout-s.wager).toFixed(2)}</p></div><div class="pill">${legs.filter(l=>l.live>.02).length?'Alive':'Dead/Risk'}</div></div><div class="metrics"><div class="metric"><span>Implied</span><b>${fmtPct(imp)}</b></div><div class="metric"><span>Live Hit %</span><b>${fmtPct(par)}</b></div><div class="metric"><span>Edge</span><b class="${cls(edge)}">${edge>=0?'+':''}${fmtPct(edge)}</b></div><div class="metric"><span>Fair Odds</span><b>${fair(par)}</b></div><div class="metric"><span>EV</span><b class="${cls(ev)}">${ev>=0?'+':''}$${ev.toFixed(2)}</b></div><div class="metric"><span>In Target</span><b>${legs.filter(l=>l.p&&l.p.rank<=l.target).length} / ${legs.length}</b></div><div class="metric"><span>Alive Legs</span><b>${legs.filter(l=>l.live>.02).length} / ${legs.length}</b></div></div><div class="wrap"><table><thead><tr><th>Leg</th><th>Player</th><th>Pos</th><th>Total</th><th>Round</th><th>Hole</th><th>Thru</th><th>R1</th><th>R2</th><th>R3</th><th>In?</th><th>Base</th><th>Live Hit</th><th>Leg Edge</th><th>Status</th></tr></thead><tbody>${legs.map(l=>`<tr><td><span class="leg">${l.n}</span></td><td><b>${l.name}</b><small>Top ${l.target}</small></td><td>${l.p?.pos||'—'}</td><td>${l.p?.score||'—'}</td><td>${l.p?.roundScore||'—'}</td><td>${l.p?.hole||'—'}</td><td>${l.p?.thru??'—'}</td><td>${l.p?.r1||'—'}</td><td>${l.p?.r2||'—'}</td><td>${l.p?.r3||'—'}</td><td class="${l.p&&l.p.rank<=l.target?'good':'bad'}">${l.p&&l.p.rank<=l.target?'YES':'NO'}</td><td>${l.base}%</td><td><div class="bar"><i style="width:${Math.max(1,l.live*100)}%"></i></div>${fmtPct(l.live)}</td><td class="${cls(l.edge)}">${l.edge>=0?'+':''}${fmtPct(l.edge)}</td><td class="${l.status==='Alive'?'good':'bad'}">${l.status}</td></tr>`).join('')}</tbody></table></div></section>`}document.getElementById('kpis').innerHTML=`<div class="kpi"><span>Tournament</span><b>${data.events?.[0]?.name||'PGA'}</b></div><div class="kpi"><span>Total Wager</span><b>$4.00</b></div><div class="kpi"><span>Max To Pay</span><b>$659.00</b></div><div class="kpi"><span>Total Live EV</span><b class="${cls(totalEV)}">${totalEV>=0?'+':''}$${totalEV.toFixed(2)}</b></div><div class="kpi"><span>Best Slip</span><b>${best.name}</b></div><div class="kpi"><span>Best Edge</span><b class="${cls(best.edge)}">${best.edge>=0?'+':''}${fmtPct(best.edge)}</b></div><div class="kpi"><span>Alive Slips</span><b>${alive}</b></div><div class="kpi"><span>Last Refresh</span><b style="font-size:15px">${new Date().toLocaleString()}</b></div>`;document.getElementById('app').innerHTML=html+`<section class="model"><h2>Live Model Notes</h2><p>This page now fetches ESPN PGA scoreboard JSON directly in the browser. It recalculates tied positions by total score and derives current round/hole from the returned linescore. Model probabilities are estimates, not sportsbook guarantees.</p><p><button onclick="load()">Refresh Now</button> &nbsp; <a target="_blank" href="${API}">View raw ESPN feed</a></p></section>`}async function load(){try{document.body.style.cursor='progress';let r=await fetch(API,{cache:'no-store'});let d=await r.json();render(d)}catch(e){document.getElementById('app').innerHTML='<section class="model"><h2>Live feed error</h2><p>Could not fetch ESPN data from this browser. Try refreshing, or the API may be blocking the request temporarily.</p></section>'}finally{document.body.style.cursor='default'}}load();setInterval(load,60000);</script></body></html>
