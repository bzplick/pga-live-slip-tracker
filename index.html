<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>The Memorial Tournament Live Slip Tracker</title><style>*{box-sizing:border-box}body{margin:0;background:#07111f;color:#f4f7ff;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif}header,main,.kpis{max-width:1180px;margin:auto}header{padding:28px 18px}h1{font-size:42px;line-height:1.05;margin:0 0 12px}.sub{color:#aab7ca;font-size:18px;line-height:1.45}.badge{display:inline-block;margin-top:16px;border:1px solid #30455f;border-radius:999px;padding:10px 14px;color:#c4cfdf}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:0 18px;margin-bottom:18px}.kpi{background:#111d2e;border:1px solid #25364d;border-radius:16px;padding:15px}.kpi span,.metric span{display:block;color:#9fb0c5;font-size:12px;text-transform:uppercase}.kpi b{font-size:23px}main{padding:0 18px}.slip{background:#202124;border:1px solid #33363d;border-radius:26px;overflow:hidden;margin:24px 0;box-shadow:0 18px 45px #0008}.slip.dead{opacity:.72;border-color:#5a2630}.top{display:flex;justify-content:space-between;gap:14px;padding:22px}h2{margin:0;font-size:28px}h2 span.sgp{font-size:16px;color:#49d84d;border:2px solid #49d84d;border-radius:7px;padding:1px 6px}h2 em{font-style:normal;margin-left:8px}.top p{color:#aeb4bf;font-size:17px;line-height:1.4}.money{display:flex;gap:22px;font-size:22px;flex-wrap:wrap}.open{color:#ffe11f;background:#4a4312;border-radius:999px;padding:9px 14px;height:max-content}.open.deadpill{color:#fff;background:#8f2435}.event{margin:0 22px 18px;background:#2b2c30;border-radius:18px;padding:18px;font-size:20px}.event small{color:#aeb4bf;font-size:17px}.metrics{display:grid;grid-template-columns:repeat(8,1fr);border-top:1px solid #343840;border-bottom:1px solid #343840}.metric{padding:13px;border-right:1px solid #343840;background:#181c25}.metric b{display:block;margin-top:4px;font-size:18px}.wrap{overflow-x:auto}table{width:100%;border-collapse:collapse;min-width:1260px}th,td{border-top:1px solid #343840;padding:13px 11px;text-align:left;white-space:nowrap}th{background:#151b25;color:#82dcff;font-size:12px;text-transform:uppercase}td small{display:block;color:#aeb4bf;margin-top:3px}.status{color:#ffc857}.good{color:#45d776!important}.bad{color:#ff687a!important}.warn{color:#ffc857!important}.bar{height:7px;width:85px;background:#333a46;border-radius:99px;overflow:hidden;margin-top:4px}.bar i{display:block;height:100%;background:linear-gradient(90deg,#ff5d73,#ffc857,#45d776)}.notes{background:#111d2e;border:1px solid #25364d;border-radius:18px;padding:16px;color:#aab7ca;line-height:1.55;margin:24px 0}.rankBadge{display:inline-block;background:#0e2d40;color:#8fe3ff;border:1px solid #255978;border-radius:999px;padding:5px 9px;margin:0 8px;font-size:13px}@media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}.metrics{grid-template-columns:repeat(2,1fr)}h1{font-size:38px}.top{flex-direction:column}}@media(max-width:480px){.kpis{grid-template-columns:1fr}}</style></head><body><header><h1>The Memorial Tournament Live Slip Tracker</h1><div class='sub'>11 new slips loaded. Supports mixed Top 10 / Top 20 / Top 30 targets, live scoring, hit %, edge, EV, fair odds, sorting, and dead-slip detection.</div><div class='badge' id='feedStatus'>Showing Memorial slip data — waiting for leaderboard.json.</div></header><section class='kpis' id='kpis'></section><main id='app'></main><script>const slips=[{"name":"Top 10 Trio","odds":25000,"wager":1,"payout":251,"legs":[["Denny McCarthy",10],["Alex Noren",10],["Justin Rose",10]]},{"name":"Top 20 Six Pack A","odds":65000,"wager":1,"payout":651,"legs":[["Maverick McNealy",20],["Lucas Glover",20],["Michael Kim",20],["Andrew Novak",20],["Ryan Fox",20],["Sahith Theegala",20]]},{"name":"Top 20 Six Pack B","odds":70000,"wager":1,"payout":701,"legs":[["Alex Fitzpatrick",20],["Bud Cauley",20],["Sungjae Im",20],["Ryan Gerard",20],["Shane Lowry",20],["Akshay Bhatia",20]]},{"name":"Top 20 Core 5","odds":3300,"wager":1,"payout":34,"legs":[["Rory McIlroy",20],["Ludvig Aberg",20],["Xander Schauffele",20],["Jacob Bridgeman",20],["Brian Harman",20]]},{"name":"Top 20 Value 5","odds":2000,"wager":1,"payout":21,"legs":[["Cameron Young",20],["Matt Fitzpatrick",20],["Tommy Fleetwood",20],["Jordan Spieth",20],["Min Woo Lee",20]]},{"name":"Mixed 20/30 5","odds":2978,"wager":1,"payout":30.78,"legs":[["Jacob Bridgeman",20],["Ryan Fox",30],["Hideki Matsuyama",30],["Jordan Spieth",30],["Sam Burns",30]]},{"name":"Top 10 Longshot 3","odds":30000,"wager":1,"payout":301,"legs":[["Brian Harman",10],["Wyndham Clark",10],["Jason Day",10]]},{"name":"Top 10 Chalk 3","odds":2600,"wager":1,"payout":27,"legs":[["Cameron Young",10],["Ben Griffin",10],["Patrick Cantlay",10]]},{"name":"Top 20 Five Pack","odds":15000,"wager":1,"payout":151,"legs":[["Gary Woodland",20],["Alex Fitzpatrick",20],["Chris Gotterup",20],["Sam Burns",20],["Shane Lowry",20]]},{"name":"Top 20 Name 5","odds":5500,"wager":1,"payout":56,"legs":[["Si Woo Kim",20],["Akshay Bhatia",20],["Justin Rose",20],["J.J. Spaun",20],["Justin Thomas",20]]},{"name":"Top 20 Triple","odds":4000,"wager":1,"payout":41,"legs":[["Andrew Novak",20],["Sahith Theegala",20],["Sungjae Im",20]]}];const BASE_BY_TARGET={10:.18,20:.32,30:.46};function n(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\./g,'').replace(/\s+/g,' ').trim()}function pscore(s){s=String(s??'E').trim();if(s==='E'||s==='')return 0;let v=Number(s.replace('+',''));return Number.isFinite(v)?v:999}function pct(x){return (x*100).toFixed(2)+'%'}function imp(o){return 100/(o+100)}function fair(p){return p<=0?'DEAD':'+'+Math.round((1-p)/p*100)}function cls(x){return x>=0?'good':'bad'}function money(x){return (x>=0?'+':'')+'$'+x.toFixed(2)}function fmtMoney(x){return '$'+Number(x).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}function legBase(t){return BASE_BY_TARGET[t]||.32}function liveProb(p,t){if(!p)return .01;if(p.missedCut)return 0;let r=p.rank||999,thru=p.thru||0,rs=pscore(p.round),gap=t-r,prob=legBase(t)+(gap*.014)+((-rs)*.014)+(thru/72*.07);if(r<=t)prob+=t===10?.16:t===20?.18:.16;if(r<=Math.floor(t/2))prob+=.06;if(r>t+18)prob-=.12;if(r>t+35)prob=.01;return Math.max(.01,Math.min(.94,prob))}function rowHtml(leg,j,legImp){let player=leg[0],target=leg[1];return `<tr data-player='${player}' data-target='${target}' data-legimp='${legImp}'><td>${j+1}</td><td><b>${player}</b><small>Top ${target} including ties</small></td><td class='pos'>Pending</td><td class='total'>—</td><td class='round'>—</td><td class='hole'>—</td><td class='gap'>—</td><td class='cut'>—</td><td class='legpct'>Pending</td><td class='legedge'>—</td><td class='status'>Static</td></tr>`}function renderCards(){let maxPay=slips.reduce((a,s)=>a+s.payout,0);document.getElementById('kpis').innerHTML=`<div class='kpi'><span>Total Slips</span><b>${slips.length}</b></div><div class='kpi'><span>Total Wager</span><b>${fmtMoney(slips.length)}</b></div><div class='kpi'><span>Max To Pay</span><b>${fmtMoney(maxPay)}</b></div><div class='kpi'><span>Tournament</span><b>Memorial</b></div>`;document.getElementById('app').innerHTML=slips.map((s,i)=>{let im=imp(s.odds),li=Math.pow(im,1/s.legs.length),rows=s.legs.map((leg,j)=>rowHtml(leg,j,li)).join('');return `<section class='slip' data-slip='${i+1}' data-odds='${s.odds}' data-wager='${s.wager}' data-payout='${s.payout}'><div class='top'><div><h2><span class='sgp'>SGP</span> <span class='rankBadge'>#${i+1}</span>${s.legs.length} Pick Parlay <em>+${s.odds.toLocaleString()}</em></h2><p>${s.legs.map(x=>x[0]).join(', ')}</p><div class='money'><b>Wager: $${s.wager.toFixed(2)}</b><b>To Pay: $${s.payout.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</b></div></div><strong class='open'>Open</strong></div><div class='event'><b>the Memorial Tournament</b><br><small>Live PGA feed via leaderboard.json</small></div><div class='metrics'><div class='metric'><span>Implied</span><b>${pct(im)}</b></div><div class='metric'><span>Live Hit %</span><b class='slipHit'>Pending</b></div><div class='metric'><span>Edge</span><b class='slipEdge'>Pending</b></div><div class='metric'><span>Fair Odds</span><b class='fairOdds'>Pending</b></div><div class='metric'><span>EV</span><b class='slipEv'>Pending</b></div><div class='metric'><span>In Target</span><b class='inTarget'>0 / ${s.legs.length}</b></div><div class='metric'><span>Alive Legs</span><b class='aliveLegs'>0 / ${s.legs.length}</b></div><div class='metric'><span>Slip Status</span><b class='slipStatus warn'>Pending</b></div></div><div class='wrap'><table><thead><tr><th>#</th><th>Player / Market</th><th>Position</th><th>Total</th><th>Round</th><th>Hole</th><th>Gap</th><th>Cut</th><th>Leg Hit %</th><th>Leg Edge</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table></div></section>`}).join('')+`<section class='notes'><b>Model:</b> Top 10, Top 20 and Top 30 legs use separate baseline probabilities. Slips sort by live hit %, dead slips move to the bottom. Refreshes from local leaderboard.json.</section>`}function setStatus(t){document.getElementById('feedStatus').textContent=t}function mapFromJson(d){let comps=d.events?.[0]?.competitions?.[0]?.competitors||[];let arr=comps.map(c=>{let ls=c.linescores||[],r=[...ls].reverse().find(x=>x&&x.displayValue!==undefined)||{},thru=Array.isArray(r.linescores)?r.linescores.length:0,total=pscore(c.score),activeToday=thru>0,status=String(c.status?.type?.name||c.status?.displayName||'').toLowerCase(),missedCut=status.includes('cut')||status.includes('wd')||status.includes('dq');return {name:c.athlete?.displayName||'',total,score:c.score||'E',round:r.displayValue||'E',hole:thru>=18?'F':(thru?thru+1:'—'),thru,order:c.order||999,activeToday,missedCut}}).sort((a,b)=>a.total-b.total||a.order-b.order);let ties={};arr.forEach(p=>{p.rank=1+arr.filter(x=>x.total<p.total).length;ties[p.rank]=(ties[p.rank]||0)+1});arr.forEach(p=>p.pos=(ties[p.rank]>1?'T':'')+p.rank);return Object.fromEntries(arr.map(p=>[n(p.name),p]))}function recalcSlip(sec){let rows=[...sec.querySelectorAll('tr[data-player]')],probs=[],inside=0,alive=0,dead=false;rows.forEach(row=>{let val=parseFloat(row.dataset.live||'0.01'),rank=parseInt(row.dataset.rank||'999',10),target=parseInt(row.dataset.target||'20',10);if(row.dataset.dead==='1'){dead=true;val=0}probs.push(val);if(rank<=target)inside++;if(val>.02)alive++});let par=dead?0:probs.reduce((a,b)=>a*b,1),o=Number(sec.dataset.odds),w=Number(sec.dataset.wager),pay=Number(sec.dataset.payout),implied=imp(o),edge=par-implied,ev=par*(pay-w)-(1-par)*w;sec.dataset.par=par;sec.dataset.edge=edge;sec.dataset.ev=ev;sec.dataset.dead=dead?'1':'0';sec.querySelector('.slipHit').textContent=dead?'0.00%':pct(par);sec.querySelector('.slipEdge').textContent=(edge>=0?'+':'')+pct(edge);sec.querySelector('.slipEdge').className='slipEdge '+cls(edge);sec.querySelector('.fairOdds').textContent=fair(par);sec.querySelector('.slipEv').textContent=money(ev);sec.querySelector('.slipEv').className='slipEv '+cls(ev);sec.querySelector('.inTarget').textContent=inside+' / '+rows.length;sec.querySelector('.aliveLegs').textContent=dead?'0 / '+rows.length:alive+' / '+rows.length;let stat=sec.querySelector('.slipStatus'),pill=sec.querySelector('.open');if(dead){sec.classList.add('dead');stat.textContent='DEAD';stat.className='slipStatus bad';pill.textContent='DEAD';pill.className='open deadpill'}else{sec.classList.remove('dead');stat.textContent='ALIVE';stat.className='slipStatus good';pill.textContent='Open';pill.className='open'}return{par,edge,ev,dead}}function sortSlips(){let app=document.getElementById('app'),notes=app.querySelector('.notes'),cards=[...app.querySelectorAll('.slip')];cards.sort((a,b)=>{let ad=a.dataset.dead==='1',bd=b.dataset.dead==='1';if(ad!==bd)return ad?1:-1;return Number(b.dataset.par||0)-Number(a.dataset.par||0)||Number(b.dataset.edge||0)-Number(a.dataset.edge||0)});cards.forEach((c,i)=>{let rb=c.querySelector('.rankBadge');if(rb)rb.textContent='#'+(i+1);app.insertBefore(c,notes)})}async function loadLive(){try{let r=await fetch('leaderboard.json?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw Error('no local json');let d=await r.json(),m=mapFromJson(d),found=0,totalEV=0,best={name:'—',edge:-99},deadSlips=0;document.querySelectorAll('tr[data-player]').forEach(row=>{let p=m[n(row.dataset.player)],legImp=Number(row.dataset.legimp),target=Number(row.dataset.target);if(!p)return;found++;row.dataset.rank=p.rank;row.dataset.dead=p.missedCut?'1':'0';let lp=liveProb(p,target);row.dataset.live=lp;let edge=lp-legImp;row.querySelector('.pos').textContent=p.pos;row.querySelector('.total').textContent=p.score;row.querySelector('.round').textContent=p.round;row.querySelector('.hole').textContent=p.hole;row.querySelector('.gap').textContent=(target-p.rank)>=0?'+'+(target-p.rank):(target-p.rank);row.querySelector('.gap').className='gap '+((target-p.rank)>=0?'good':'bad');row.querySelector('.cut').textContent=p.missedCut?'Missed Cut':(p.activeToday?'Playing Today':'Safe');row.querySelector('.cut').className='cut '+(p.missedCut?'bad':'good');row.querySelector('.legpct').innerHTML=`${pct(lp)}<div class='bar'><i style='width:${Math.max(1,lp*100)}%'></i></div>`;row.querySelector('.legedge').textContent=(edge>=0?'+':'')+pct(edge);row.querySelector('.legedge').className='legedge '+cls(edge);let st=row.querySelector('.status');if(p.missedCut){st.textContent='DEAD - Missed Cut';st.className='status bad'}else if(p.rank<=target){st.textContent='Inside Top '+target;st.className='status good'}else{st.textContent=p.activeToday?'Active Outside Top '+target:'Outside Top '+target;st.className='status warn'}});document.querySelectorAll('.slip').forEach(sec=>{let rr=recalcSlip(sec);totalEV+=rr.ev;if(rr.dead)deadSlips++;if(!rr.dead&&rr.edge>best.edge)best={name:'Slip '+sec.dataset.slip,edge:rr.edge}});sortSlips();document.getElementById('kpis').innerHTML=`<div class='kpi'><span>Live Rows</span><b>${found}</b></div><div class='kpi'><span>Dead Slips</span><b class='bad'>${deadSlips}</b></div><div class='kpi'><span>Total Live EV</span><b class='${cls(totalEV)}'>${money(totalEV)}</b></div><div class='kpi'><span>Best Alive Edge</span><b class='${cls(best.edge)}'>${best.name} ${best.edge>-90?((best.edge>=0?'+':'')+pct(best.edge)):'—'}</b></div>`;setStatus(found?'Memorial tracker live — updated '+found+' player rows.':'leaderboard.json loaded but no Memorial player names matched.')}catch(e){setStatus('Memorial slips showing. leaderboard.json not ready or feed unavailable.')}}renderCards();loadLive();setInterval(loadLive,60000);</script></body></html>
