<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>DraftKings PGA Slip Tracker</title><style>*{box-sizing:border-box}body{margin:0;background:#07111f;color:#f4f7ff;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif}header,main,.kpis{max-width:1180px;margin:auto}header{padding:28px 18px}.sub{color:#aab7ca;font-size:18px;line-height:1.45}h1{font-size:42px;line-height:1.05;margin:0 0 12px}.badge{display:inline-block;margin-top:16px;border:1px solid #30455f;border-radius:999px;padding:10px 14px;color:#c4cfdf}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:0 18px;margin-bottom:18px}.kpi{background:#111d2e;border:1px solid #25364d;border-radius:16px;padding:15px}.kpi span,.metric span{display:block;color:#9fb0c5;font-size:12px;text-transform:uppercase}.kpi b{font-size:24px}main{padding:0 18px}.slip{background:#202124;border:1px solid #33363d;border-radius:26px;overflow:hidden;margin:24px 0;box-shadow:0 18px 45px #0008}.slip.dead{opacity:.72;border-color:#5a2630}.top{display:flex;justify-content:space-between;gap:14px;padding:22px}h2{margin:0;font-size:28px}h2 span{font-size:16px;color:#49d84d;border:2px solid #49d84d;border-radius:7px;padding:1px 6px}h2 em{font-style:normal;margin-left:8px}.top p{color:#aeb4bf;font-size:17px;line-height:1.4}.money{display:flex;gap:22px;font-size:22px;flex-wrap:wrap}.open{color:#ffe11f;background:#4a4312;border-radius:999px;padding:9px 14px;height:max-content}.open.deadpill{color:#fff;background:#8f2435}.event{margin:0 22px 18px;background:#2b2c30;border-radius:18px;padding:18px;font-size:20px}.event small{color:#aeb4bf;font-size:17px}.metrics{display:grid;grid-template-columns:repeat(8,1fr);border-top:1px solid #343840;border-bottom:1px solid #343840}.metric{padding:13px;border-right:1px solid #343840;background:#181c25}.metric b{display:block;margin-top:4px;font-size:18px}.wrap{overflow-x:auto}table{width:100%;border-collapse:collapse;min-width:1220px}th,td{border-top:1px solid #343840;padding:13px 11px;text-align:left;white-space:nowrap}th{background:#151b25;color:#82dcff;font-size:12px;text-transform:uppercase}td small{display:block;color:#aeb4bf;margin-top:3px}.status{color:#ffc857}.good{color:#45d776!important}.bad{color:#ff687a!important}.warn{color:#ffc857!important}.bar{height:7px;width:80px;background:#333a46;border-radius:99px;overflow:hidden;margin-top:4px}.bar i{display:block;height:100%;background:linear-gradient(90deg,#ff5d73,#ffc857,#45d776)}.notes{background:#111d2e;border:1px solid #25364d;border-radius:18px;padding:16px;color:#aab7ca;line-height:1.55;margin:24px 0}.rankBadge{display:inline-block;background:#0e2d40;color:#8fe3ff;border:1px solid #255978;border-radius:999px;padding:5px 9px;margin-right:8px;font-size:13px}@media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}.metrics{grid-template-columns:repeat(2,1fr)}h1{font-size:38px}.top{flex-direction:column}}@media(max-width:480px){.kpis{grid-template-columns:1fr}}</style></head><body><header><h1>DraftKings PGA Slip Tracker</h1><div class='sub'>Sorted best-to-worst after every live refresh. Any slip with a player worse than the <b>-2 cut line</b> is marked <b>DEAD</b> and pushed to the bottom.</div><div class='badge' id='feedStatus'>Showing slip data — waiting for leaderboard.json.</div></header><section class='kpis' id='kpis'></section><main id='app'></main><script>const CUT=-2,TARGET=20,BASE=.32;const slips=[['5 Pick Parlay',40000,1,401,['Ryo Hisatsune','Gary Woodland','Ryan Gerard','Max Greyserman','Jackson Suber']],['3 Pick Parlay',9000,1,91,['Austin Smotherman','Emiliano Grillo','Max Homa']],['3 Pick Parlay',1000,1,11,['Justin Thomas','J.J. Spaun','Ben Griffin']],['3 Pick Parlay',4500,1,46,['Sahith Theegala','Max McGreevy','Chris Kirk']],['3 Pick Parlay',125000,1,1251,['Joe Highsmith','Takumi Kanaya','Adam Schenk']],['3 Pick Parlay',22500,1,226,['Patrick Fishburn','Matthieu Pavon','Ben Kohles']],['7 Pick Parlay',25000,1,251,['Ludvig Aberg','Keegan Bradley','Akshay Bhatia','J.J. Spaun','Hideki Matsuyama','Robert MacIntyre','Russell Henley']]];function n(s){return String(s||'').toLowerCase().replace(/\./g,'').replace(/\s+/g,' ').trim()}function pscore(s){s=String(s??'E').trim();if(s==='E'||s==='')return 0;return Number(s.replace('+',''))}function pct(x){return (x*100).toFixed(2)+'%'}function imp(o){return 100/(o+100)}function fair(p){return p<=0?'DEAD':'+'+Math.round((1-p)/p*100)}function cls(x){return x>=0?'good':'bad'}function money(x){return (x>=0?'+':'')+'$'+x.toFixed(2)}function liveProb(p){if(!p)return .01;if(p.missedCut)return 0;let r=p.rank||999,thru=p.thru||0,rs=pscore(p.round),gap=TARGET-r;let prob=BASE+(gap*.018)+((-rs)*.018)+(thru/72*.08);if(r<=TARGET)prob+=.18;if(r<=10)prob+=.08;if(r>35)prob-=.16;if(r>55)prob=.01;return Math.max(.01,Math.min(.92,prob))}function rowHtml(player,j,legImp){return `<tr data-player='${player}' data-legimp='${legImp}'><td>${j+1}</td><td><b>${player}</b><small>Top 20 including ties</small></td><td class='pos'>Pending</td><td class='total'>—</td><td class='round'>—</td><td class='hole'>—</td><td class='gap'>—</td><td class='cut'>—</td><td class='legpct'>Pending</td><td class='legedge'>—</td><td class='status'>Static</td></tr>`}function renderCards(){document.getElementById('kpis').innerHTML=`<div class='kpi'><span>Total Slips</span><b>7</b></div><div class='kpi'><span>Total Wager</span><b>$7.00</b></div><div class='kpi'><span>Max To Pay</span><b>$2,477.00</b></div><div class='kpi'><span>Cut Line</span><b>${CUT}</b></div>`;document.getElementById('app').innerHTML=slips.map((s,i)=>{let im=imp(s[1]),li=Math.pow(im,1/s[4].length),rows=s[4].map((p,j)=>rowHtml(p,j,li)).join('');return `<section class='slip' data-slip='${i+1}' data-odds='${s[1]}' data-wager='${s[2]}' data-payout='${s[3]}'><div class='top'><div><h2><span>SGP</span> <span class='rankBadge'>#${i+1}</span>${s[0]} <em>+${s[1].toLocaleString()}</em></h2><p>${s[4].join(', ')}</p><div class='money'><b>Wager: $${s[2].toFixed(2)}</b><b>To Pay: $${s[3].toFixed(2)}</b></div></div><strong class='open'>Open</strong></div><div class='event'><b>Charles Schwab Challenge 2026</b><br><small>May 28, 2026, 8:00 AM</small></div><div class='metrics'><div class='metric'><span>Implied</span><b>${pct(im)}</b></div><div class='metric'><span>Live Hit %</span><b class='slipHit'>Pending</b></div><div class='metric'><span>Edge</span><b class='slipEdge'>Pending</b></div><div class='metric'><span>Fair Odds</span><b class='fairOdds'>Pending</b></div><div class='metric'><span>EV</span><b class='slipEv'>Pending</b></div><div class='metric'><span>In Target</span><b class='inTarget'>0 / ${s[4].length}</b></div><div class='metric'><span>Alive Legs</span><b class='aliveLegs'>0 / ${s[4].length}</b></div><div class='metric'><span>Slip Status</span><b class='slipStatus warn'>Pending</b></div></div><div class='wrap'><table><thead><tr><th>#</th><th>Player / Market</th><th>Position</th><th>Total</th><th>Round</th><th>Hole</th><th>Gap</th><th>Cut</th><th>Leg Hit %</th><th>Leg Edge</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table></div></section>`}).join('')+`<section class='notes'><b>Sort logic:</b> Alive slips sort by highest live hit percentage first. Dead slips move to the bottom. A leg is dead if the player is worse than the -2 cut line.</section>`}function setStatus(t){document.getElementById('feedStatus').textContent=t}function mapFromJson(d){let comps=d.events?.[0]?.competitions?.[0]?.competitors||[];let arr=comps.map(c=>{let ls=c.linescores||[],r=[...ls].reverse().find(x=>x&&x.displayValue!==undefined)||{},thru=Array.isArray(r.linescores)?r.linescores.length:0,total=pscore(c.score);return{name:c.athlete?.displayName||'',total,score:c.score||'E',round:r.displayValue||'E',hole:thru>=18?'F':(thru?thru+1:'—'),thru,order:c.order||999,missedCut:total>CUT}}).sort((a,b)=>a.total-b.total||a.order-b.order);let ties={};arr.forEach(p=>{p.rank=1+arr.filter(x=>x.total<p.total).length;ties[p.rank]=(ties[p.rank]||0)+1});arr.forEach(p=>p.pos=(ties[p.rank]>1?'T':'')+p.rank);return Object.fromEntries(arr.map(p=>[n(p.name),p]))}function recalcSlip(sec){let rows=[...sec.querySelectorAll('tr[data-player]')],probs=[],inside=0,alive=0,dead=false,deadNames=[];rows.forEach(row=>{let val=parseFloat(row.dataset.live||'0.01'),rank=parseInt(row.dataset.rank||'999',10);if(row.dataset.dead==='1'){dead=true;deadNames.push(row.dataset.player);val=0}probs.push(val);if(rank<=TARGET)inside++;if(val>.02)alive++});let par=dead?0:probs.reduce((a,b)=>a*b,1),o=Number(sec.dataset.odds),w=Number(sec.dataset.wager),pay=Number(sec.dataset.payout),implied=imp(o),edge=par-implied,ev=par*(pay-w)-(1-par)*w;sec.dataset.par=par;sec.dataset.edge=edge;sec.dataset.ev=ev;sec.dataset.dead=dead?'1':'0';sec.querySelector('.slipHit').textContent=dead?'0.00%':pct(par);sec.querySelector('.slipEdge').textContent=(edge>=0?'+':'')+pct(edge);sec.querySelector('.slipEdge').className='slipEdge '+cls(edge);sec.querySelector('.fairOdds').textContent=fair(par);sec.querySelector('.slipEv').textContent=money(ev);sec.querySelector('.slipEv').className='slipEv '+cls(ev);sec.querySelector('.inTarget').textContent=inside+' / '+rows.length;sec.querySelector('.aliveLegs').textContent=dead?'0 / '+rows.length:alive+' / '+rows.length;let stat=sec.querySelector('.slipStatus'),pill=sec.querySelector('.open');if(dead){sec.classList.add('dead');stat.textContent='DEAD';stat.className='slipStatus bad';pill.textContent='DEAD';pill.className='open deadpill';}else{sec.classList.remove('dead');stat.textContent='ALIVE';stat.className='slipStatus good';pill.textContent='Open';pill.className='open';}return{par,edge,ev,dead}}function sortSlips(){let app=document.getElementById('app'),notes=app.querySelector('.notes');let cards=[...app.querySelectorAll('.slip')];cards.sort((a,b)=>{let ad=a.dataset.dead==='1',bd=b.dataset.dead==='1';if(ad!==bd)return ad?1:-1;return Number(b.dataset.par||0)-Number(a.dataset.par||0)||Number(b.dataset.edge||0)-Number(a.dataset.edge||0)});cards.forEach((c,i)=>{let rb=c.querySelector('.rankBadge');if(rb)rb.textContent='#'+(i+1);app.insertBefore(c,notes)});}async function loadLive(){try{let r=await fetch('leaderboard.json?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw Error('no local json');let d=await r.json(),m=mapFromJson(d),found=0,totalEV=0,best={name:'—',edge:-99},deadSlips=0;document.querySelectorAll('tr[data-player]').forEach(row=>{let p=m[n(row.dataset.player)],legImp=Number(row.dataset.legimp);if(!p)return;found++;row.dataset.rank=p.rank;row.dataset.dead=p.missedCut?'1':'0';let lp=liveProb(p);row.dataset.live=lp;let edge=lp-legImp;row.querySelector('.pos').textContent=p.pos;row.querySelector('.total').textContent=p.score;row.querySelector('.round').textContent=p.round;row.querySelector('.hole').textContent=p.hole;row.querySelector('.gap').textContent=(TARGET-p.rank)>=0?'+'+(TARGET-p.rank):(TARGET-p.rank);row.querySelector('.gap').className='gap '+((TARGET-p.rank)>=0?'good':'bad');row.querySelector('.cut').textContent=p.missedCut?'Missed -2':'Safe';row.querySelector('.cut').className='cut '+(p.missedCut?'bad':'good');row.querySelector('.legpct').innerHTML=`${pct(lp)}<div class='bar'><i style='width:${Math.max(1,lp*100)}%'></i></div>`;row.querySelector('.legedge').textContent=(edge>=0?'+':'')+pct(edge);row.querySelector('.legedge').className='legedge '+cls(edge);let st=row.querySelector('.status');if(p.missedCut){st.textContent='DEAD - Missed Cut';st.className='status bad'}else if(p.rank<=TARGET){st.textContent='Inside Top 20';st.className='status good'}else{st.textContent='Outside Top 20';st.className='status warn'}});document.querySelectorAll('.slip').forEach((sec,i)=>{let rr=recalcSlip(sec);totalEV+=rr.ev;if(rr.dead)deadSlips++;if(!rr.dead&&rr.edge>best.edge)best={name:'Slip '+sec.dataset.slip,edge:rr.edge}});sortSlips();document.getElementById('kpis').innerHTML=`<div class='kpi'><span>Live Rows</span><b>${found}</b></div><div class='kpi'><span>Dead Slips</span><b class='bad'>${deadSlips}</b></div><div class='kpi'><span>Total Live EV</span><b class='${cls(totalEV)}'>${money(totalEV)}</b></div><div class='kpi'><span>Best Alive Edge</span><b class='${cls(best.edge)}'>${best.name} ${best.edge>-90?((best.edge>=0?'+':'')+pct(best.edge)):'—'}</b></div>`;setStatus(found?'Sorted best-to-worst. Dead slips pushed down. Updated '+found+' player rows.':'leaderboard.json loaded but no player names matched.')}catch(e){setStatus('Slip data showing. leaderboard.json not ready or feed unavailable.')}}renderCards();loadLive();setInterval(loadLive,60000);</script></body></html>
