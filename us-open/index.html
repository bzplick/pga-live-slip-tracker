<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>US Open Full Monty</title><style>:root{--bg:#04100b;--card:#092016;--card2:#0e2b1d;--line:#276544;--txt:#f3fff7;--mut:#aac0b1;--g:#35e783;--y:#ffd166;--r:#ff5b6e;--b:#8ab4ff}*{box-sizing:border-box}body{margin:0;background:linear-gradient(#06140e,#020806);color:var(--txt);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;font-weight:700}header{position:sticky;top:0;z-index:10;background:rgba(4,16,11,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:14px 14px 10px}h1{margin:0;font-size:25px;line-height:1.05}.sub{color:var(--mut);font-size:12px;margin-top:3px}.bar{display:flex;gap:8px;margin-top:10px}.btn,button{border:1px solid var(--line);background:#103722;color:var(--txt);border-radius:16px;padding:10px 12px;font-weight:900;text-decoration:none;min-height:42px}button{cursor:pointer}.primary{background:var(--g);color:#022010;border:0}.wrap{padding:12px;display:grid;gap:12px;padding-bottom:90px}.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.box,.slip,.player{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:13px;box-shadow:0 6px 20px #0008}.box b{display:block;font-size:22px;color:var(--g)}.box span,.muted,small{color:var(--mut)}.sources{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.sources a{text-align:center}.status{border-radius:999px;padding:6px 10px;border:1px solid var(--line);font-size:12px;white-space:nowrap}.good{color:var(--g)}.warn{color:var(--y)}.bad{color:var(--r)}.blue{color:var(--b)}.slipHead{display:flex;justify-content:space-between;gap:10px;border-bottom:1px solid var(--line);padding-bottom:10px;margin-bottom:8px}.odds{text-align:right;font-size:18px}.legs{display:grid;gap:8px}.leg{display:grid;grid-template-columns:1fr auto;gap:8px;background:#06180f;border:1px solid #17472e;border-radius:14px;padding:9px}.player{display:grid;gap:10px}.pTop{display:flex;justify-content:space-between;gap:8px}.pName{font-size:18px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.stat{background:#06180f;border:1px solid #17472e;border-radius:12px;padding:8px;text-align:center}.stat b{display:block;font-size:16px}.stat span{color:var(--mut);font-size:11px}.meter{height:8px;background:#05140c;border-radius:99px;overflow:hidden;border:1px solid #17472e}.meter i{display:block;height:100%;background:var(--g);width:1%}.filter{position:fixed;bottom:0;left:0;right:0;background:rgba(4,16,11,.96);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:10px;display:grid;grid-template-columns:1fr auto auto;gap:8px}input{background:#06180f;color:var(--txt);border:1px solid var(--line);border-radius:15px;padding:12px;font-weight:800;min-width:0}.hidden{display:none!important}@media(min-width:760px){.wrap{max-width:920px;margin:auto}.kpis{grid-template-columns:repeat(4,1fr)}.stats{grid-template-columns:repeat(8,1fr)}h1{font-size:32px}}</style></head><body><header><h1>🏌️ US Open Full Monty</h1><div class="sub">Mobile live slip tracker • Top 20 incl. ties • Auto-refresh every 60 sec</div><div class="bar"><button class="primary" onclick="loadLive()">Refresh</button><span class="status" id="feed">loading</span><span class="status" id="updated">—</span></div></header><main class="wrap"><section class="kpis" id="kpis"></section><section class="box"><div class="sources"><a class="btn" target="_blank" href="https://www.usopen.com/scoring.html">USGA</a><a class="btn" target="_blank" href="https://www.espn.com/golf/leaderboard">ESPN</a><a class="btn" target="_blank" href="https://datagolf.com/live-model">DataGolf</a></div><small>Live board attempts ESPN/JSON in-browser. SG/GIR/Fairways are modeled placeholders unless the feed supplies them.</small></section><section id="slips"></section><section class="box"><h2 style="margin:0 0 8px">Individual Players</h2><div id="players"></div></section></main><div class="filter"><input id="search" placeholder="Search player" oninput="applyFilter()"><button onclick="toggleOnlyTop()">Top</button><button onclick="toggleOnlyEV()">+EV</button></div><script>const slips=[{name:'Longshot Trio',odds:'+13000',w:1,pay:131,cash:.05,legs:[['Sungjae Im',20,450],['Dustin Johnson',20,450],['Gary Woodland',20,330]]},{name:'Core 4',odds:'+1900',w:1,pay:20,cash:1.40,legs:[['Scottie Scheffler',20,-350],['Rory McIlroy',20,-185],['Cameron Young',20,-110],['Keegan Bradley',20,320]]},{name:'Mid Plus 4',odds:'+2600',w:1,pay:27,cash:.06,legs:[['Ludvig Aberg',20,105],['Russell Henley',20,120],['Si Woo Kim',20,115],['Bryson DeChambeau',20,160]]},{name:'Plus 2',odds:'+3500',w:1,pay:36,cash:1.00,legs:[['Max McGreevy',20,600],['Sahith Theegala',20,400]]},{name:'Value 4',odds:'+13000',w:1,pay:131,cash:.21,legs:[['Jake Knapp',20,300],['Alex Fitzpatrick',20,250],['Robert MacIntyre',20,240],['Justin Thomas',20,185]]},{name:'Burns/Spaun',odds:'+610',w:5,pay:35.5,cash:.25,legs:[['Sam Burns',20,150],['J.J. Spaun',20,180]]}];let board={},onlyTop=false,onlyEV=false;const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];function norm(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'')}function money(n){return '$'+Number(n||0).toFixed(2)}function implied(o){o=Number(o);return o<0?(-o)/((-o)+100):100/(o+100)}function parsePos(v){let m=String(v??'').match(/\d+/);return m?+m[0]:999}function parseScore(v){if(v==null||v==='')return null;let t=String(v).trim().replace('−','-').toUpperCase();if(t==='E'||t==='EVEN')return 0;let n=parseInt(t.replace('+',''),10);return isNaN(n)?null:n}function fmt(v){if(v==null||v==='')return '—';if(typeof v==='number')return v>0?'+'+v:String(v);return String(v)}function calcProb(player,target,odds){let r=board[norm(player)]||{},rank=parsePos(r.pos||r.position||r.rank),total=parseScore(r.total||r.score),today=parseScore(r.today||r.roundScore),thru=parseInt(r.thru||r.hole||0)||0;let p=implied(odds);if(rank<999){p+=(target-rank)*.017;if(rank<=target)p+=.18;if(rank>target+15)p-=.14}if(total!=null)p+=(-total)*.012;if(today!=null)p+=(-today)*.018;if(thru)p+=Math.min(thru,18)/18*.035;return Math.max(.01,Math.min(.96,p))}function statModel(player){let r=board[norm(player)]||{},seed=norm(player).split('').reduce((a,c)=>a+c.charCodeAt(0),0);return{gir:r.gir||r.GIR||Math.round(58+(seed%23)),fw:r.fairways||r.fw||Math.round(50+(seed%29)),sgt:r.sgt2g||r.sgT2G||((seed%31)/10-.8).toFixed(1),sga:r.sgapp||r.sgAPP||((seed%25)/10-.7).toFixed(1),sgp:r.sgputt||r.sgPutting||((seed%21)/10-.9).toFixed(1)}}function renderBase(){let players={};slips.forEach(s=>s.legs.forEach(l=>players[l[0]]={target:l[1],odds:l[2]}));let tw=slips.reduce((a,s)=>a+s.w,0),tp=slips.reduce((a,s)=>a+s.pay,0);$('#kpis').innerHTML=`<div class=box><b>${slips.length}</b><span>Slips</span></div><div class=box><b>${Object.keys(players).length}</b><span>Players</span></div><div class=box><b>${money(tw)}</b><span>Wagered</span></div><div class=box><b>${money(tp)}</b><span>Max payout</span></div>`;$('#slips').innerHTML=slips.map((s,i)=>`<article class=slip data-slip=${i}><div class=slipHead><div><h2 style="margin:0">Slip ${i+1}: ${s.name}</h2><small>${s.legs.length} legs • wager ${money(s.w)} • pays ${money(s.pay)} • cashout ${money(s.cash)}</small></div><div class=odds>${s.odds}<br><span class=status id=sstat${i}>open</span></div></div><div class=legs>${s.legs.map(l=>`<div class=leg data-name="${l[0]}"><div><b>${l[0]}</b><small>Top ${l[1]} • odds ${l[2]>0?'+':''}${l[2]}</small></div><span class=status>waiting</span></div>`).join('')}</div></article>`).join('');$('#players').innerHTML=Object.keys(players).sort().map(p=>`<article class=player data-player="${p}"><div class=pTop><div><div class=pName>${p}</div><small>Top ${players[p].target} • odds ${players[p].odds>0?'+':''}${players[p].odds}</small></div><span class=status>waiting</span></div><div class=stats><div class=stat><b class=pos>—</b><span>Pos</span></div><div class=stat><b class=total>—</b><span>Total</span></div><div class=stat><b class=today>—</b><span>Today</span></div><div class=stat><b class=hole>—</b><span>Hole</span></div><div class=stat><b class=gir>—</b><span>GIR</span></div><div class=stat><b class=fw>—</b><span>Fairway</span></div><div class=stat><b class=sgt>—</b><span>SG T2G</span></div><div class=stat><b class=edge>—</b><span>Edge</span></div></div><div><small>Hit probability</small><div class=meter><i></i></div></div></article>`).join('')}function updateUI(){let alive=0;slips.forEach((s,i)=>{let slipProb=1,inside=0,dead=false;s.legs.forEach(l=>{let p=calcProb(...l),r=board[norm(l[0])]||{},rank=parsePos(r.pos||r.position||r.rank),today=parseScore(r.today||r.roundScore),st=rank<=l[1]?'inside':rank<=l[1]+7?'near':'outside';if(rank<=l[1])inside++;if(today!=null&&today>5)dead=true;let el=$(`.leg[data-name="${l[0]}"] .status`);if(el){el.textContent=rank<999?`${st} • ${Math.round(p*100)}%`:`model ${Math.round(p*100)}%`;el.className='status '+(st==='inside'?'good':st==='near'?'warn':'bad')}slipProb*=p});if(!dead)alive++;let fair=s.pay*slipProb,ev=fair-s.w,ss=$('#sstat'+i);ss.textContent=`${inside}/${s.legs.length} • hit ${Math.round(slipProb*100)}% • fair ${money(fair)} • EV ${money(ev)}`;ss.className='status '+(ev>0?'good':'warn')});let players={};slips.forEach(s=>s.legs.forEach(l=>players[l[0]]={target:l[1],odds:l[2]}));$$('.player').forEach(card=>{let name=card.dataset.player,meta=players[name],r=board[norm(name)]||{},p=calcProb(name,meta.target,meta.odds),imp=implied(meta.odds),rank=parsePos(r.pos||r.position||r.rank),st=statModel(name);card.dataset.top=rank<=meta.target?'1':'0';card.dataset.ev=p>imp?'1':'0';card.querySelector('.pos').textContent=rank<999?(r.pos||r.position||r.rank):'—';card.querySelector('.total').textContent=fmt(r.total||r.score);card.querySelector('.today').textContent=fmt(r.today||r.roundScore);card.querySelector('.hole').textContent=fmt(r.thru||r.hole);card.querySelector('.gir').textContent=st.gir+'%';card.querySelector('.fw').textContent=st.fw+'%';card.querySelector('.sgt').textContent=st.sgt;card.querySelector('.edge').textContent=((p-imp)*100).toFixed(1)+'%';card.querySelector('.meter i').style.width=Math.round(p*100)+'%';let tag=card.querySelector('.pTop .status');tag.textContent=`${Math.round(p*100)}% hit`;tag.className='status '+(rank<=meta.target?'good':p>imp?'blue':'warn')});$('#kpis').innerHTML+=`<div class=box><b>${alive}</b><span>Alive slips</span></div>`;applyFilter()}async function tryFetch(){let urls=['leaderboard.json','https://site.web.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard','https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard'];for(const u of urls){try{let res=await fetch(u+(u.includes('?')?'&':'?')+'t='+Date.now(),{cache:'no-store'});if(!res.ok)throw new Error(res.status);let data=await res.json();return{u,data}}catch(e){}}throw new Error('blocked')}function readESPN(data){let rows={};let comps=[];(data.events||[]).forEach(e=>(e.competitions||[]).forEach(c=>comps.push(c)));comps.forEach(comp=>(comp.competitors||[]).forEach(c=>{let name=c.athlete?.displayName||c.displayName||c.name;if(!name)return;let last=(c.linescores||[]).slice(-1)[0]||{};rows[norm(name)]={pos:c.curatedRank?.current||c.rank||c.order,total:c.score||c.displayValue,today:last.displayValue||last.value,thru:last.thru||last.period||'',source:'ESPN'}}));return rows}function readGeneric(data){let arr=Array.isArray(data)?data:data.players||data.leaderboard||data.rows||[];let rows={};arr.forEach(r=>{let n=r.player||r.name||r.golfer||r.athlete?.displayName;if(n)rows[norm(n)]=r});return rows}async function loadLive(){try{$('#feed').textContent='loading';let got=await tryFetch();board=got.u.includes('espn')?readESPN(got.data):readGeneric(got.data);$('#feed').textContent=got.u.includes('espn')?'ESPN feed':'JSON feed';$('#updated').textContent=new Date().toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});renderBase();updateUI()}catch(e){$('#feed').textContent='live blocked';$('#updated').textContent='model mode';renderBase();updateUI()}}function applyFilter(){let q=norm($('#search').value);$$('.player').forEach(c=>{let show=norm(c.dataset.player).includes(q)&&(!onlyTop||c.dataset.top==='1')&&(!onlyEV||c.dataset.ev==='1');c.classList.toggle('hidden',!show)})}function toggleOnlyTop(){onlyTop=!onlyTop;applyFilter()}function toggleOnlyEV(){onlyEV=!onlyEV;applyFilter()}renderBase();loadLive();setInterval(loadLive,60000);</script></body></html>
